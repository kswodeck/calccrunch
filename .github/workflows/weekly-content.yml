name: Weekly Content Generation (Claude)

# Fully automatic, direct-to-production content engine:
#   1. Claude researches trending topics and ships 1 calculator + 2 blog posts
#      (see engine/playbooks/weekly-content-agent.md for its instructions)
#   2. `npm run build` validates + builds everything Claude produced
#   3. On success, the changes are committed and pushed straight to the
#      default branch — Netlify's git integration deploys it from there.
# No PRs, no manual review step. If validation/build fails, nothing is pushed.

on:
  schedule:
    # Mondays at 06:00 America/Los_Angeles (13:00 UTC) — ahead of the daily
    # scheduled-build rebuild, so this week's batch ships with this run.
    - cron: '0 13 * * 1'
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: weekly-content-generation
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate this week's content with Claude
        uses: anthropics/claude-code-base-action@beta
        id: claude
        with:
          prompt_file: engine/playbooks/weekly-content-agent.md
          allowed_tools: "Read,Write,Edit,Glob,Grep,Bash,WebSearch,WebFetch,TodoWrite"
          max_turns: "120"
          model: claude-sonnet-4-6
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Fail fast if Claude didn't finish cleanly
        if: steps.claude.outputs.conclusion != 'success'
        run: |
          echo "Claude run did not conclude successfully — aborting before any commit/push."
          exit 1

      # The Claude action installs and activates its own Node 18 on the runner,
      # which clobbers the Node 22 from the earlier Setup Node step. Astro needs
      # >=22.12, so re-pin Node 22 here before building.
      - name: Re-pin Node 22 for the build
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build (validates content + does a full production build)
        run: npm run build

      - name: Commit and push generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- ':!dist' ':!.astro'
          if git diff --cached --quiet; then
            echo "No content changes produced — nothing to commit."
          else
            git commit -m "content: weekly auto-generated calculator + blog posts ($(date -u +'%Y-%m-%d'))"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
