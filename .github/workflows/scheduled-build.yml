name: Scheduled Build (Publish Blog Posts)

on:
  schedule:
    # Runs at 6:00 AM PST (2:00 PM UTC) every other day (days 1,3,5,...,31).
    # Calculators/posts are statically gated by `lastUpdated`/`publishDate`
    # (hidden until that date), so a periodic rebuild is what actually makes
    # drip-scheduled content go live on its day — see
    # engine/playbooks/weekly-content-agent.md for how content gets scheduled.
    # Note: */2 is day-of-month based, so the gap resets at month boundaries
    # (e.g. the 31st is followed by the 1st).
    - cron: '0 14 */2 * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI anytime

jobs:
  trigger-netlify-build:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify Build Hook
        run: curl -X POST -d {} ${{ secrets.NETLIFY_BUILD_HOOK }}
